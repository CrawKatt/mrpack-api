<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicio de sesión - Panel administrativo de Mrpack API">
    <meta name="robots" content="noindex, nofollow">
    <title>Iniciar Sesión - Mrpack API</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-container">
        <!-- Header -->
        <header class="login-header">
            <div class="login-logo">🔐</div>
            <h1 class="login-title">Mrpack API</h1>
            <p class="login-subtitle">Panel Administrativo</p>
        </header>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Login Form -->
        <form id="loginForm" class="login-form" novalidate>
            <!-- Username Field -->
            <div class="form-group">
                <label for="username" class="form-label">
                    Usuario
                </label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-input"
                    placeholder="Ingresa tu usuario"
                    required
                    autocomplete="username"
                    autofocus
                >
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password" class="form-label">
                    Contraseña
                </label>
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="Ingresa tu contraseña"
                        required
                        autocomplete="current-password"
                    >
                    <button
                        type="button"
                        id="passwordToggle"
                        class="password-toggle"
                        aria-label="Mostrar/ocultar contraseña"
                        tabindex="-1"
                    >👁️</button>
                </div>
            </div>

            <!-- Remember Me -->
            <div class="checkbox-wrapper">
                <input
                    type="checkbox"
                    id="rememberMe"
                    name="rememberMe"
                    class="checkbox-input"
                >
                <label for="rememberMe" class="checkbox-label">
                    Mantener sesión en esta pestaña
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitButton" class="btn-login">
                🔐 Iniciar Sesión
            </button>
        </form>



        <!-- Footer -->
        <footer class="login-footer">
            <p class="login-footer-text">Mrpack API v1.0</p>
            <div class="login-footer-links">
                <a href="/api/health" class="footer-link" target="_blank" rel="noopener">
                    Estado del API
                </a>
            </div>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="/js/login.js"></script>
</body>
</html>
